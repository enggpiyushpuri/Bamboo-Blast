<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Baby Panda: Bamboo Blast</title>
<style>
  :root{
    --ink:#23402c; --leaf:#4f8a4f; --bamboo:#9CC76A;
    --cream:#FBF6E3; --sun:#F7C948; --berry:#E2574C;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;background:#1d3324;font-family:'Trebuchet MS','Segoe UI',sans-serif;user-select:none;-webkit-user-select:none}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
  canvas{display:block;touch-action:none;border-radius:6px;box-shadow:0 12px 40px rgba(0,0,0,.45)}
  .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
  .panel{pointer-events:auto;background:var(--cream);border:4px solid var(--ink);border-radius:24px;
    padding:22px 24px;max-width:600px;width:min(94vw,600px);max-height:92vh;overflow-y:auto;text-align:center;
    box-shadow:0 18px 50px rgba(0,0,0,.5), inset 0 0 0 3px rgba(156,199,106,.45)}
  h1{font-size:clamp(24px,5vw,40px);color:var(--ink);letter-spacing:.5px;line-height:1.05}
  h1 .accent{color:var(--leaf)}
  h2{color:var(--ink);font-size:clamp(20px,4vw,30px);margin-bottom:6px}
  .sub{color:#5d7a5d;font-size:13px;margin:8px 0 12px}
  .btn{display:inline-block;cursor:pointer;border:3px solid var(--ink);background:var(--bamboo);
    color:var(--ink);font-weight:800;font-size:17px;border-radius:14px;padding:11px 24px;margin:6px;
    box-shadow:0 4px 0 var(--ink);transition:transform .08s, box-shadow .08s}
  .btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--ink)}
  .btn.alt{background:var(--sun)}
  .levels{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin:12px 0 6px}
  .lv{position:relative;cursor:pointer;border:3px solid var(--ink);border-radius:12px;background:var(--bamboo);
    color:var(--ink);font-weight:900;font-size:16px;padding:10px 0 15px;box-shadow:0 3px 0 var(--ink)}
  .lv:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
  .lv.locked{background:#cfcabb;color:#8b8678;cursor:not-allowed;box-shadow:0 3px 0 #8b8678;border-color:#8b8678}
  .lv .stars{position:absolute;left:0;right:0;bottom:2px;font-size:9px;letter-spacing:1px;color:var(--sun);text-shadow:0 0 2px var(--ink)}
  .lv.locked .stars{visibility:hidden}
  .zone{font-size:11px;font-weight:800;letter-spacing:2px;color:#5d7a5d;text-transform:uppercase;margin:10px 0 2px;text-align:left}
  .bigstars{font-size:clamp(30px,8vw,48px);letter-spacing:6px;margin:4px 0 6px;color:var(--sun);text-shadow:0 2px 0 var(--ink)}
  .dim{color:#cfc7ad}
  .scoreline{font-size:16px;color:var(--ink);font-weight:700;margin-bottom:8px}
  .hidden{display:none !important}
  .panda-art{font-size:42px;line-height:1;margin-bottom:2px}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>

  <div class="overlay" id="menuOverlay">
    <div class="panel">
      <div class="panda-art">🐼🎋</div>
      <h1>BABY PANDA <span class="accent">BAMBOO BLAST</span></h1>
      <p class="sub">The sneaky red foxes stole the bamboo stash! Sling baby pandas through 30 levels and 6 lands to win it back. 🦊</p>
      <div id="levelGrid"></div>
    </div>
  </div>

  <div class="overlay hidden" id="endOverlay">
    <div class="panel">
      <div class="panda-art" id="endEmoji">🐼</div>
      <h2 id="endTitle">Level Clear!</h2>
      <div class="bigstars" id="endStars">★ ★ ★</div>
      <div class="scoreline" id="endScore">Score: 0</div>
      <button class="btn" id="btnRetry">↺ Retry</button>
      <button class="btn alt" id="btnNext">Next ▶</button>
      <button class="btn" id="btnMenu">☰ Levels</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
(() => {
"use strict";
const { Engine, World, Bodies, Body, Events, Vector } = Matter;

/* ---------------- audio (fully synthesized, zero files, off the main render path) ---------------- */
const SND = (() => {
  let ac = null, master = null, ambGain = null, ambTimer = null;
  let on = true, started = false, lastHit = 0;
  const now = () => ac.currentTime;

  function init(){
    if (started) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) { on = false; return; }
    ac = new AC();
    master = ac.createGain(); master.gain.value = 0.5; master.connect(ac.destination);
    ambGain = ac.createGain(); ambGain.gain.value = 0.0; ambGain.connect(master);
    started = true;
    startAmbient();
  }
  function resume(){ if (ac && ac.state === 'suspended') ac.resume(); }

  // a soft plucked "bamboo flute" note
  function note(freq, t0, dur, vol, type){
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type || 'sine'; o.frequency.value = freq;
    const f = ac.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 1600;
    o.connect(f); f.connect(g); g.connect(master);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(vol, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0008, t0 + dur);
    o.start(t0); o.stop(t0 + dur + 0.02);
  }

  // gentle pentatonic ambient loop — calm bamboo-grove feel
  const PENT = [261.63, 293.66, 329.63, 392.0, 440.0, 523.25];
  function startAmbient(){
    if (ambTimer) clearInterval(ambTimer);
    ambGain.gain.cancelScheduledValues(now());
    ambGain.gain.linearRampToValueAtTime(0.06, now() + 3);
    let i = 0;
    ambTimer = setInterval(() => {
      if (!on || !ac || ac.state !== 'running') return;
      const t0 = now() + 0.02;
      const base = PENT[(i * 3 + 2) % PENT.length] / 2;   // low, slow
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'triangle'; o.frequency.value = base;
      const f = ac.createBiquadFilter(); f.type='lowpass'; f.frequency.value = 800;
      o.connect(f); f.connect(g); g.connect(ambGain);
      g.gain.setValueAtTime(0, t0);
      g.gain.linearRampToValueAtTime(0.9, t0 + 0.6);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + 2.4);
      o.start(t0); o.stop(t0 + 2.5);
      i++;
    }, 2600);
  }

  return {
    enabled: () => on,
    kick(){ init(); resume(); },
    toggle(){
      on = !on;
      if (started) ambGain.gain.linearRampToValueAtTime(on ? 0.06 : 0, now() + 0.3);
      return on;
    },
    // soft rising "boing" on launch
    launch(power){
      if (!on || !started) return;
      const t0 = now();
      const o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(220, t0);
      o.frequency.exponentialRampToValueAtTime(520 + power*260, t0 + 0.18);
      g.gain.setValueAtTime(0.0001, t0);
      g.gain.linearRampToValueAtTime(0.32, t0 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0008, t0 + 0.32);
      o.connect(g); g.connect(master);
      o.start(t0); o.stop(t0 + 0.35);
    },
    // woody knock when things collide — strength 0..1
    knock(strength, hard){
      if (!on || !started) return;
      const t = performance.now();
      if (t - lastHit < 28) return;       // throttle so a big collapse can't spam
      lastHit = t;
      const t0 = now();
      // noise burst through a bandpass = "tok"
      const len = 0.09;
      const buf = ac.createBuffer(1, ac.sampleRate * len, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0;i<d.length;i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
      const src = ac.createBufferSource(); src.buffer = buf;
      const bp = ac.createBiquadFilter(); bp.type='bandpass';
      bp.frequency.value = hard ? 320 : 700; bp.Q.value = hard ? 6 : 3;
      const g = ac.createGain(); g.gain.value = Math.min(0.5, 0.12 + strength*0.5);
      src.connect(bp); bp.connect(g); g.connect(master);
      src.start(t0);
    },
    // happy two-note chime when a fox pops
    pop(big){
      if (!on || !started) return;
      const t0 = now();
      const a = big ? 523.25 : 659.25, b = big ? 783.99 : 987.77;
      note(a, t0, 0.18, 0.3, 'triangle');
      note(b, t0 + 0.09, 0.22, 0.26, 'triangle');
    },
    // cheerful ascending arpeggio on level clear
    win(){
      if (!on || !started) return;
      const t0 = now();
      [523.25, 659.25, 783.99, 1046.5].forEach((f,i) => note(f, t0 + i*0.12, 0.35, 0.3, 'triangle'));
    },
    // gentle descending "aww" on loss
    lose(){
      if (!on || !started) return;
      const t0 = now();
      [440, 392, 329.63, 261.63].forEach((f,i) => note(f, t0 + i*0.14, 0.4, 0.26, 'sine'));
    },
  };
})();

/* ---------------- canvas & scaling ---------------- */
const W = 1280, H = 720;
const cv = document.getElementById('game');
const ctx = cv.getContext('2d');
function fit(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  cv.style.width  = (W * s) + 'px';
  cv.style.height = (H * s) + 'px';
  cv.width  = W * dpr; cv.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
addEventListener('resize', fit); fit();

function toWorld(e){
  const r = cv.getBoundingClientRect();
  const p = (e.touches && e.touches[0]) || e;
  return { x: (p.clientX - r.left) / r.width * W, y: (p.clientY - r.top) / r.height * H };
}

/* ---------------- constants ---------------- */
const GROUND_Y = 640;
const SLING = { x: 215, y: GROUND_Y - 130 };
const MAXPULL = 130;
const PANDA_R = 26;
const LAUNCH = 0.20;          // px/step per px of pull  (tuned: was wildly too fast before)
const GRAV_STEP = 0.29;       // matter gravity per step, used by trajectory preview
const MAX_SPIN = 0.18;        // cap angular velocity so the panda doesn't blur-spin

const TOTAL_LEVELS = 100;

/* ---------------- themes: background changes every 5 levels ---------------- */
const THEMES = [
  { name:'Spring Grove',  sky:['#CDEBD3','#E9F5DC','#F4EFD3'], mt1:'rgba(122,165,132,.35)', mt2:'rgba(96,142,106,.30)',
    ground:'#8CBF6B', groundTop:'#79A95B', grass:'#6B9A50', grove:'#7FB069', cloud:'rgba(255,255,255,.8)', dot:'rgba(35,64,44,.55)' },
  { name:'Golden Sunset', sky:['#FFD9A0','#FFB87C','#F2935C'], mt1:'rgba(150,90,110,.40)',  mt2:'rgba(110,60,90,.38)',
    ground:'#B99A55', groundTop:'#A28245', grass:'#8F7038', grove:'#A8893F', cloud:'rgba(255,235,210,.85)', dot:'rgba(80,40,20,.6)', sun:true },
  { name:'Misty Morning', sky:['#D8E8F2','#E8F1F2','#EFF2E6'], mt1:'rgba(120,150,170,.35)', mt2:'rgba(95,125,150,.32)',
    ground:'#9FBF8C', groundTop:'#8BAD78', grass:'#7A9C68', grove:'#8FAF8C', cloud:'rgba(255,255,255,.95)', dot:'rgba(50,70,90,.55)', mist:true },
  { name:'Autumn Forest', sky:['#F7E0B5','#F2C892','#E8B07B'], mt1:'rgba(170,110,70,.38)',  mt2:'rgba(140,85,55,.35)',
    ground:'#C9A05A', groundTop:'#B58C48', grass:'#A1793C', grove:'#C77E45', cloud:'rgba(255,245,225,.8)', dot:'rgba(90,50,20,.6)', leaves:true },
  { name:'Moonlit Night', sky:['#16213E','#1F3050','#2C4663'], mt1:'rgba(20,35,60,.6)',     mt2:'rgba(12,24,45,.6)',
    ground:'#33523F', groundTop:'#2A4534', grass:'#22392B', grove:'#3E5E48', cloud:'rgba(200,215,235,.18)', dot:'rgba(235,240,255,.7)', night:true },
  { name:'Snowy Peaks',   sky:['#CFE2EE','#E3EDF4','#F2F5F7'], mt1:'rgba(150,175,200,.45)', mt2:'rgba(120,150,180,.40)',
    ground:'#EDF2F5', groundTop:'#DCE6EC', grass:'#C9D8E0', grove:'#7E9C86', cloud:'rgba(255,255,255,.95)', dot:'rgba(60,85,110,.6)', snow:true },
];
const themeFor = lvl => THEMES[Math.floor(lvl / 5) % THEMES.length];

/* ---------------- state ---------------- */
let engine, world;
let blocks = [], foxes = [], pandas = [], particles = [], clouds = [], stars = [], flakes = [];
let currentPanda = null, slingLoaded = false, dragging = false, dragPos = null;
let pandasLeft = 0, score = 0, levelIdx = 0, state = 'menu';
let launchTime = 0, shakeT = 0, theme = THEMES[0], levelReadyAt = 0;

const SAVE_KEY = 'pandaBlastSave_v2';
let save = { unlocked: 1, stars: {}, best: {} };
try { const s = JSON.parse(localStorage.getItem(SAVE_KEY)); if (s && s.unlocked) save = s; } catch(e){}
let memOnly = false;
function persist(){
  if (memOnly) return;
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); } catch(e){ memOnly = true; }
}

/* ---------------- level pieces ---------------- */
const V = { w: 26, h: 120 }, Hh = { w: 150, h: 24 }, BOX = { w: 56, h: 56 };
const vbar = (x,y,hard) => ({ t:'v', x, y, hard });
const hbar = (x,y,hard) => ({ t:'h', x, y, hard });
const box  = (x,y)      => ({ t:'box', x, y });
const fox  = (x,y,big)  => ({ t:'fox', x, y, big: !!big });
const gy = (h, lift=0) => GROUND_Y - h/2 - lift;
const F1 = V.h + Hh.h; // one floor height

/* ---------------- handcrafted levels 1–10 ---------------- */
const HAND = [
  { pandas: 4, items: [ // 1
    vbar(880, gy(V.h)), vbar(990, gy(V.h)), hbar(935, gy(Hh.h, V.h)),
    fox(935, gy(44)) ]},
  { pandas: 4, items: [ // 2
    vbar(800, gy(V.h)), vbar(900, gy(V.h)), vbar(1000, gy(V.h)),
    hbar(850, gy(Hh.h, V.h)), hbar(950, gy(Hh.h, V.h)),
    fox(850, gy(44)), fox(950, gy(44)) ]},
  { pandas: 3, items: [ // 3
    vbar(870, gy(V.h)), vbar(970, gy(V.h)), hbar(920, gy(Hh.h, V.h)),
    fox(920, gy(44)), fox(920, gy(44, F1)), box(790, gy(BOX.h)) ]},
  { pandas: 4, items: [ // 4
    vbar(860, gy(V.h)), vbar(980, gy(V.h)), hbar(920, gy(Hh.h, V.h)),
    vbar(880, gy(V.h, F1)), vbar(960, gy(V.h, F1)), hbar(920, gy(Hh.h, V.h + F1)),
    fox(920, gy(44)), fox(920, gy(44, F1)) ]},
  { pandas: 4, items: [ // 5
    box(820, gy(BOX.h)), box(820, gy(BOX.h, BOX.h)), box(820, gy(BOX.h, 2*BOX.h)),
    fox(900, gy(44)),
    vbar(970, gy(V.h)), vbar(1070, gy(V.h)), hbar(1020, gy(Hh.h, V.h)),
    fox(1020, gy(44)), fox(1020, gy(44, F1)) ]},
  { pandas: 4, items: [ // 6 — big fox debut
    vbar(840, gy(V.h)), vbar(940, gy(V.h)), hbar(890, gy(Hh.h, V.h)),
    fox(890, gy(60), true),
    box(1010, gy(BOX.h)), box(1010, gy(BOX.h, BOX.h)),
    fox(1080, gy(44)) ]},
  { pandas: 5, items: [ // 7 — the tower
    vbar(900, gy(V.h)), vbar(1000, gy(V.h)), hbar(950, gy(Hh.h, V.h)),
    vbar(910, gy(V.h, F1)), vbar(990, gy(V.h, F1)), hbar(950, gy(Hh.h, V.h + F1)),
    vbar(925, gy(V.h, 2*F1)), vbar(975, gy(V.h, 2*F1)), hbar(950, gy(Hh.h, V.h + 2*F1)),
    fox(950, gy(44)), fox(950, gy(44, F1)), fox(950, gy(44, 3*F1)) ]},
  { pandas: 5, items: [ // 8 — fortress
    box(760, gy(BOX.h)), box(760, gy(BOX.h, BOX.h)),
    vbar(860, gy(V.h)), vbar(960, gy(V.h)), vbar(1060, gy(V.h)),
    hbar(910, gy(Hh.h, V.h)), hbar(1010, gy(Hh.h, V.h)),
    fox(910, gy(44)), fox(1010, gy(44)),
    box(910, gy(BOX.h, F1)), box(1010, gy(BOX.h, F1)),
    fox(960, gy(60, F1 + BOX.h), true) ]},
  { pandas: 5, items: [ // 9 — twin towers
    vbar(810, gy(V.h)), vbar(890, gy(V.h)), hbar(850, gy(Hh.h, V.h)),
    vbar(825, gy(V.h, F1)), vbar(875, gy(V.h, F1)), hbar(850, gy(Hh.h, V.h + F1)),
    fox(850, gy(44, 2*F1)),
    vbar(1010, gy(V.h)), vbar(1090, gy(V.h)), hbar(1050, gy(Hh.h, V.h)),
    vbar(1025, gy(V.h, F1)), vbar(1075, gy(V.h, F1)), hbar(1050, gy(Hh.h, V.h + F1)),
    fox(1050, gy(44, 2*F1)),
    fox(950, gy(44)), fox(850, gy(44)), fox(1050, gy(44)) ]},
  { pandas: 6, items: [ // 10 — grand castle
    box(740, gy(BOX.h)), box(740, gy(BOX.h, BOX.h)), box(740, gy(BOX.h, 2*BOX.h)),
    vbar(840, gy(V.h)), vbar(930, gy(V.h)), vbar(1020, gy(V.h)), vbar(1110, gy(V.h)),
    hbar(885, gy(Hh.h, V.h)), hbar(1065, gy(Hh.h, V.h)),
    fox(885, gy(44)), fox(1065, gy(44)),
    vbar(905, gy(V.h, F1)), vbar(1045, gy(V.h, F1)), hbar(975, gy(Hh.h, V.h + F1)),
    fox(975, gy(44, F1)),
    box(975, gy(BOX.h, 2*F1)),
    fox(975, gy(60, 2*F1 + BOX.h), true) ]},
];

/* ---------------- procedural levels 11–30 (seeded, deterministic) ---------------- */
function mulberry32(a){ return function(){ a|=0; a = a + 0x6D2B79F5 | 0;
  let t = Math.imul(a ^ a >>> 15, 1 | a); t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
  return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

function genLevel(idx){          // idx 10..99
  // smooth 0..1 difficulty curve across the whole procedural range
  const span = TOTAL_LEVELS - 1 - 10;        // last index - first procedural index
  const diff = Math.min(1, (idx - 10) / span);
  const k = 1 + (idx - 9);                    // legacy step, still handy
  const rng = mulberry32(9001 + idx * 271);
  const items = [];
  let foxN = 0, bigN = 0;

  // small vertical gap so stacked pieces settle gently instead of exploding apart
  const GAP = 2;

  // shield crates in front (taller walls later)
  const crates = Math.min(4, Math.floor(rng() * (1 + diff * 4)));
  for (let c = 0; c < crates; c++) items.push(box(715 + rng()*30, gy(BOX.h, c * (BOX.h + GAP))));

  const towerCount = Math.min(5, 2 + Math.floor(diff * 3.5) + (rng() < .35 ? 1 : 0));
  let x = 770 + rng() * 30;
  const hardChance = Math.min(.7, .06 + diff * .6);   // dark hardwood bamboo ramps up

  for (let t = 0; t < towerCount && x < 1170; t++){
    const width = 90 + rng() * 38;
    const maxFloors = 1 + Math.round(diff * 3);       // up to 4 storeys at the very end
    const floors = 1 + Math.min(maxFloors, Math.floor(rng() * (1.3 + diff * 3)));
    let lift = 0;
    for (let f = 0; f < floors; f++){
      const hard = rng() < hardChance;
      items.push(vbar(x - width/2, gy(V.h, lift), hard));
      items.push(vbar(x + width/2, gy(V.h, lift), hard));
      items.push(hbar(x, gy(Hh.h, V.h + lift + GAP), hard && rng() < .5));
      if (rng() < .68 + diff*.15){ items.push(fox(x, gy(44, lift))); foxN++; }
      lift += F1 + GAP;
    }
    // rooftop occupant
    const roofRoll = rng();
    if (roofRoll < .18 + diff * .35){
      items.push(fox(x, gy(60, lift), true)); bigN++;
    } else if (roofRoll < .6){
      items.push(fox(x, gy(44, lift))); foxN++;
    } else if (rng() < .4){
      items.push(box(x, gy(BOX.h, lift)));
    }
    x += width + 50 + rng() * 45;
  }

  // floating sentries on the highest levels add aiming challenge
  if (diff > .55 && rng() < .5){ items.push(fox(640 + rng()*120, gy(44, Math.min(280, F1*2 + rng()*120)), rng() < .3)); rng()<.3?bigN++:foxN++; }

  // guarantee a sensible minimum that grows with difficulty
  const minTargets = 2 + Math.floor(diff * 3);
  while (foxN + bigN < minTargets){ items.push(fox(740 + rng()*120, gy(44))); foxN++; }

  // safety: nothing may spawn above the visible play area (keeps foxes reachable)
  const CEIL = 95;
  for (const it of items){ if (it.y < CEIL) it.y = CEIL; }

  // panda budget: generous early, tight late (never trivially easy or impossible)
  const targets = foxN + bigN * 1.7;
  const ratio = 1.05 - diff * 0.45;            // 1.05 down to ~0.6 pandas per target
  const pandasN = Math.max(3, Math.min(8, Math.round(targets * ratio)));
  return { pandas: pandasN, items };
}

const LEVELS = [];
for (let i = 0; i < TOTAL_LEVELS; i++) LEVELS.push(i < HAND.length ? HAND[i] : genLevel(i));

/* ---------------- world setup ---------------- */
function matFor(kind, hard){
  if (kind === 'box') return { friction:.6, restitution:.1, density:.0016 };
  return hard ? { friction:.7, restitution:.06, density:.0024 }
              : { friction:.6, restitution:.1,  density:.0012 };
}

function buildLevel(i){
  levelIdx = i;
  theme = themeFor(i);
  engine = Engine.create();
  engine.gravity.y = 1.05;
  world = engine.world;
  blocks = []; foxes = []; pandas = []; particles = [];
  currentPanda = null; slingLoaded = false; dragging = false; dragPos = null;
  score = 0; shakeT = 0;

  World.add(world, [
    Bodies.rectangle(W/2, GROUND_Y + 40, W*2, 80, { isStatic:true, friction:.9, label:'ground' }),
    Bodies.rectangle(W + 40, H/2, 80, H*2, { isStatic:true, label:'wall' }),
    Bodies.rectangle(-40, H/2, 80, H*2, { isStatic:true, label:'wall' }),
  ]);

  const L = LEVELS[i];
  pandasLeft = L.pandas;

  for (const it of L.items){
    if (it.t === 'fox'){
      const r = it.big ? 30 : 22;
      const b = Bodies.circle(it.x, it.y, r, { friction:.7, restitution:.18, density:.0015, label:'fox' });
      b.plugin = { hp: it.big ? 60 : 28, maxhp: it.big ? 60 : 28, big: it.big, wob: Math.random()*6.28 };
      foxes.push(b); World.add(world, b);
    } else {
      const d = it.t === 'v' ? V : it.t === 'h' ? Hh : BOX;
      const b = Bodies.rectangle(it.x, it.y, d.w, d.h, { ...matFor(it.t, it.hard), label:'block' });
      const baseHp = it.t === 'box' ? 50 : 70;
      b.plugin = { kind: it.t, hard: !!it.hard, hp: it.hard ? baseHp*2.3 : baseHp, maxhp: it.hard ? baseHp*2.3 : baseHp };
      blocks.push(b); World.add(world, b);
    }
  }

  Events.on(engine, 'collisionStart', onHit);

  clouds = []; stars = []; flakes = [];
  for (let c=0;c<5;c++) clouds.push({ x: Math.random()*W, y: 60+Math.random()*160, s:.6+Math.random()*.9, v:.1+Math.random()*.25 });
  if (theme.night){ const r = mulberry32(42); for (let s=0;s<70;s++) stars.push({ x:r()*W, y:r()*420, r:.6+r()*1.6, tw:r()*6.28 }); }
  if (theme.snow || theme.leaves){ for (let f=0;f<40;f++) flakes.push({ x:Math.random()*W, y:Math.random()*H, v:.4+Math.random()*.9, sway:Math.random()*6.28, r:2+Math.random()*3 }); }

  loadPanda();
  levelReadyAt = performance.now() + 600;   // ignore damage while structure settles
  state = 'aiming';
}

function loadPanda(){
  if (pandasLeft <= 0) return;
  const p = Bodies.circle(SLING.x, SLING.y, PANDA_R, { density:.0022, friction:.5, frictionAir:.008, restitution:.55, label:'panda' });
  Body.setStatic(p, true);
  p.plugin = { face:'happy', spent:false };
  pandas.push(p); World.add(world, p);
  currentPanda = p; slingLoaded = true;
}

/* ---------------- collisions ---------------- */
function onHit(ev){
  // during the brief settle window after a level loads, ignore all damage so
  // the structure can come to rest without crushing its own foxes
  const settling = performance.now() < levelReadyAt;
  for (const pair of ev.pairs){
    const a = pair.bodyA, b = pair.bodyB;
    const rel = Vector.magnitude(Vector.sub(a.velocity, b.velocity));
    const pandaHit = a.label === 'panda' || b.label === 'panda';
    // a fox is only ever hurt by a genuine hit: either the panda strikes it,
    // or debris is moving fast enough to be a real collapse (not gentle settling)
    const foxHit = a.label === 'fox' || b.label === 'fox';
    const minRel = foxHit && !pandaHit ? 6.5 : 2.2;
    if (settling || rel < minRel) continue;
    const dmg = Math.min(60, (rel - 2) * (pandaHit ? 6.5 : 3.2));
    hurt(a, dmg, b); hurt(b, dmg, a);
    const hard = (a.plugin && a.plugin.hard) || (b.plugin && b.plugin.hard);
    SND.knock(Math.min(1, (rel - minRel) / 12), hard);
    if (rel > 6) shakeT = Math.min(10, shakeT + rel * .6);
  }
}

function hurt(body, dmg, other){
  if (!body.plugin || body.plugin.hp === undefined) return;
  if (other.label === 'wall') return;
  body.plugin.hp -= dmg;
  if (body.label === 'fox' && dmg > 4) body.plugin.face = 'ouch';
  if (body.plugin.hp <= 0){
    if (body.label === 'fox') killFox(body); else breakBlock(body);
  }
}

function killFox(f){
  if (f.plugin.dead) return; f.plugin.dead = true;
  score += f.plugin.big ? 1500 : 800;
  SND.pop(f.plugin.big);
  poof(f.position.x, f.position.y, '#E2574C', f.plugin.big ? 26 : 16);
  poof(f.position.x, f.position.y, '#fff', 8);
  World.remove(world, f);
  foxes = foxes.filter(x => x !== f);
  checkEnd();
}
function breakBlock(bl){
  if (bl.plugin.dead) return; bl.plugin.dead = true;
  score += 120;
  poof(bl.position.x, bl.position.y, bl.plugin.kind === 'box' ? '#C9A14E' : (bl.plugin.hard ? '#5E7A3A' : '#8FBF5A'), 12);
  World.remove(world, bl);
  blocks = blocks.filter(x => x !== bl);
}

/* ---------------- particles ---------------- */
function poof(x,y,color,n){
  for (let i=0;i<n;i++){
    const a = Math.random()*6.283, sp = 1+Math.random()*4;
    particles.push({ x, y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-2, r:3+Math.random()*5, life:1, color });
  }
}

/* ---------------- flow ---------------- */
function fireSling(){
  if (!currentPanda || !dragPos) return;
  const dx = SLING.x - dragPos.x, dy = SLING.y - dragPos.y;
  const d = Math.hypot(dx,dy);
  if (d < 12){
    Body.setPosition(currentPanda, { x:SLING.x, y:SLING.y });
    dragging = false; dragPos = null; return;
  }
  Body.setStatic(currentPanda, false);
  const sp = LAUNCH * Math.min(d, MAXPULL);
  Body.setVelocity(currentPanda, { x: dx/d*sp, y: dy/d*sp });
  Body.setAngularVelocity(currentPanda, .08);
  SND.launch(Math.min(d, MAXPULL) / MAXPULL);
  currentPanda.plugin.spent = true;
  currentPanda.plugin.face = 'fly';
  slingLoaded = false; dragging = false; dragPos = null;
  pandasLeft--; launchTime = performance.now();
  state = 'flying';
}

function checkEnd(){
  if (state === 'end') return;
  if (foxes.length === 0){ state = 'end'; setTimeout(() => endLevel(true), 700); }
}

function endLevel(win){
  state = 'end';
  const stars3 = win ? Math.max(1, Math.min(3, pandasLeft + 1)) : 0;
  if (win){
    score += pandasLeft * 500;
    const id = String(levelIdx);
    save.stars[id] = Math.max(save.stars[id] || 0, stars3);
    save.best[id]  = Math.max(save.best[id]  || 0, score);
    if (levelIdx + 1 < TOTAL_LEVELS) save.unlocked = Math.max(save.unlocked, levelIdx + 2);
    persist();
  }
  if (win) SND.win(); else SND.lose();
  document.getElementById('endEmoji').textContent = win ? '🐼🎉' : '😿';
  document.getElementById('endTitle').textContent = win ? `Level ${levelIdx+1} Clear!` : 'Out of pandas!';
  document.getElementById('endStars').innerHTML = win
    ? '★'.repeat(stars3) + '<span class="dim">' + '★'.repeat(3-stars3) + '</span>'
    : '<span class="dim">★★★</span>';
  document.getElementById('endScore').textContent = win ? `Score: ${score}` : 'The foxes kept the bamboo…';
  document.getElementById('btnNext').classList.toggle('hidden', !(win && levelIdx + 1 < TOTAL_LEVELS));
  document.getElementById('endOverlay').classList.remove('hidden');
}

/* ---------------- input ---------------- */
function pDown(e){
  if (state === 'menu' || state === 'end') return;
  const p = toWorld(e);
  if (slingLoaded && currentPanda && Math.hypot(p.x - currentPanda.position.x, p.y - currentPanda.position.y) < 80){
    dragging = true; dragPos = p; e.preventDefault();
  }
}
function pMove(e){
  if (!dragging) return;
  const p = toWorld(e);
  const dx = p.x - SLING.x, dy = p.y - SLING.y;
  const d = Math.hypot(dx,dy);
  const c = d > MAXPULL ? MAXPULL/d : 1;
  dragPos = { x: SLING.x + dx*c, y: SLING.y + dy*c };
  Body.setPosition(currentPanda, dragPos);
  e.preventDefault();
}
function pUp(){ if (dragging) fireSling(); }

cv.addEventListener('mousedown', pDown); cv.addEventListener('touchstart', pDown, {passive:false});
addEventListener('pointerdown', () => SND.kick(), { once:false });
addEventListener('mousemove', pMove); addEventListener('touchmove', pMove, {passive:false});
addEventListener('mouseup', pUp); addEventListener('touchend', pUp);

cv.addEventListener('click', e => {
  const p = toWorld(e);
  if (state === 'menu' || state === 'end') return;
  if (p.x > W-70 && p.x < W-14 && p.y < 70) { buildLevel(levelIdx); return; }
  if (p.x > W-130 && p.x < W-74 && p.y < 70) { SND.kick(); SND.toggle(); return; }
});

/* ---------------- flying / settle ---------------- */
function tickFlow(){
  if (state === 'flying' && currentPanda){
    const p = currentPanda;
    const slow = Vector.magnitude(p.velocity) < .35;
    const off  = p.position.x > W + 60 || p.position.x < -60 || p.position.y > H + 80;
    const old  = performance.now() - launchTime > 6000;
    if (slow || off || old){
      state = 'settle';
      const spent = p;
      setTimeout(() => {
        // spent panda waves goodbye — never blocks the sling
        if (spent && !spent.plugin.removed){
          spent.plugin.removed = true;
          poof(spent.position.x, spent.position.y, '#ffffff', 10);
          poof(spent.position.x, spent.position.y, '#2b2b2b', 5);
          World.remove(world, spent);
          pandas = pandas.filter(x => x !== spent);
          if (currentPanda === spent) currentPanda = null;
        }
        if (state !== 'settle') return;
        if (foxes.length === 0) return;
        if (pandasLeft > 0){ loadPanda(); state = 'aiming'; }
        else endLevel(false);
      }, 900);
    }
  }
}

/* ---------------- drawing helpers ---------------- */
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.roundRect(x,y,w,h,r); }

function drawBG(){
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, theme.sky[0]); g.addColorStop(.55, theme.sky[1]); g.addColorStop(1, theme.sky[2]);
  ctx.fillStyle = g; ctx.fillRect(0,0,W,H);

  if (theme.night){
    for (const s of stars){
      ctx.globalAlpha = .5 + .5*Math.sin(performance.now()/700 + s.tw);
      ctx.fillStyle = '#EAF2FF';
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#F4F0DA';                       // moon
    ctx.beginPath(); ctx.arc(1080, 110, 42, 0, 7); ctx.fill();
    ctx.fillStyle = theme.sky[0];
    ctx.beginPath(); ctx.arc(1064, 100, 36, 0, 7); ctx.fill();
  }
  if (theme.sun){
    const sg = ctx.createRadialGradient(1060,130,10, 1060,130,150);
    sg.addColorStop(0,'rgba(255,240,180,.95)'); sg.addColorStop(1,'rgba(255,240,180,0)');
    ctx.fillStyle = sg; ctx.beginPath(); ctx.arc(1060,130,150,0,7); ctx.fill();
    ctx.fillStyle = '#FFE9A8'; ctx.beginPath(); ctx.arc(1060,130,46,0,7); ctx.fill();
  }

  // mountains
  ctx.fillStyle = theme.mt1;
  ctx.beginPath(); ctx.moveTo(0,430);
  ctx.quadraticCurveTo(180,260,360,420); ctx.quadraticCurveTo(520,300,700,440);
  ctx.quadraticCurveTo(900,290,1100,430); ctx.quadraticCurveTo(1200,380,1280,420);
  ctx.lineTo(1280,720); ctx.lineTo(0,720); ctx.fill();
  if (theme.snow){ // snow caps
    ctx.fillStyle = 'rgba(255,255,255,.85)';
    ctx.beginPath(); ctx.moveTo(140,320); ctx.quadraticCurveTo(180,262,230,318); ctx.quadraticCurveTo(185,340,140,320); ctx.fill();
    ctx.beginPath(); ctx.moveTo(850,340); ctx.quadraticCurveTo(900,292,950,338); ctx.quadraticCurveTo(900,360,850,340); ctx.fill();
  }
  ctx.fillStyle = theme.mt2;
  ctx.beginPath(); ctx.moveTo(0,500);
  ctx.quadraticCurveTo(260,380,520,505); ctx.quadraticCurveTo(800,395,1080,510);
  ctx.quadraticCurveTo(1200,470,1280,500); ctx.lineTo(1280,720); ctx.lineTo(0,720); ctx.fill();

  // clouds
  ctx.fillStyle = theme.cloud;
  for (const c of clouds){
    c.x += c.v; if (c.x > W + 90) c.x = -90;
    ctx.beginPath();
    ctx.arc(c.x, c.y, 22*c.s, 0, 7);
    ctx.arc(c.x+24*c.s, c.y+6*c.s, 17*c.s, 0, 7);
    ctx.arc(c.x-24*c.s, c.y+7*c.s, 15*c.s, 0, 7);
    ctx.fill();
  }

  // mist band
  if (theme.mist){
    const m = ctx.createLinearGradient(0,420,0,580);
    m.addColorStop(0,'rgba(255,255,255,0)'); m.addColorStop(.5,'rgba(255,255,255,.45)'); m.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle = m; ctx.fillRect(0,420,W,160);
  }

  // background grove
  ctx.save(); ctx.globalAlpha = theme.night ? .5 : .35;
  for (let i=0;i<9;i++){
    const bx = 40 + i*150 + (i%2)*40;
    drawBambooStalk(bx, GROUND_Y, 230 + (i%3)*60, 14, theme.grove);
  }
  ctx.restore();

  // ground
  ctx.fillStyle = theme.ground; ctx.fillRect(0, GROUND_Y, W, H-GROUND_Y);
  ctx.fillStyle = theme.groundTop; ctx.fillRect(0, GROUND_Y, W, 14);
  ctx.fillStyle = theme.grass;
  for (let i=0;i<32;i++){
    const gx = (i*41 + 13) % W;
    ctx.beginPath(); ctx.moveTo(gx, GROUND_Y); ctx.quadraticCurveTo(gx+4, GROUND_Y-14, gx+8, GROUND_Y); ctx.fill();
  }

  // falling snow / autumn leaves
  if (flakes.length){
    for (const f of flakes){
      f.y += f.v; f.sway += .02; f.x += Math.sin(f.sway)*.5;
      if (f.y > H){ f.y = -8; f.x = Math.random()*W; }
      if (theme.snow){
        ctx.fillStyle = 'rgba(255,255,255,.9)';
        ctx.beginPath(); ctx.arc(f.x, f.y, f.r*.8, 0, 7); ctx.fill();
      } else {
        ctx.save(); ctx.translate(f.x, f.y); ctx.rotate(f.sway);
        ctx.fillStyle = 'rgba(200,110,50,.8)';
        ctx.beginPath(); ctx.ellipse(0, 0, f.r*1.6, f.r*.8, 0, 0, 7); ctx.fill();
        ctx.restore();
      }
    }
  }
}

function drawBambooStalk(x, baseY, h, w, color){
  ctx.fillStyle = color;
  const segs = Math.floor(h / 46);
  for (let s=0;s<segs;s++){ rr(x - w/2, baseY - (s+1)*46 + 3, w, 42, w/2.4); ctx.fill(); }
  ctx.strokeStyle = 'rgba(255,255,255,.35)'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(x - w/4, baseY); ctx.lineTo(x - w/4, baseY - h + 8); ctx.stroke();
  ctx.fillStyle = color;
  ctx.beginPath(); ctx.ellipse(x + w, baseY - h + 16, 22, 7, .6, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse(x - w, baseY - h + 34, 19, 6, -.7, 0, 7); ctx.fill();
}

function drawBlock(b){
  const { kind, hp, maxhp, hard } = b.plugin;
  ctx.save();
  ctx.translate(b.position.x, b.position.y);
  ctx.rotate(b.angle);
  const cracked = hp < maxhp * .5;
  if (kind === 'box'){
    ctx.fillStyle = '#D8B463'; rr(-BOX.w/2, -BOX.h/2, BOX.w, BOX.h, 8); ctx.fill();
    ctx.strokeStyle = '#A87F3A'; ctx.lineWidth = 3; rr(-BOX.w/2+3, -BOX.h/2+3, BOX.w-6, BOX.h-6, 6); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-BOX.w/2+4, -BOX.h/2+4); ctx.lineTo(BOX.w/2-4, BOX.h/2-4); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(BOX.w/2-4, -BOX.h/2+4); ctx.lineTo(-BOX.w/2+4, BOX.h/2-4); ctx.stroke();
  } else {
    const d = kind === 'v' ? V : Hh;
    ctx.fillStyle = hard ? '#5E7A3A' : '#9CC76A';
    rr(-d.w/2, -d.h/2, d.w, d.h, Math.min(d.w,d.h)/2.6); ctx.fill();
    ctx.strokeStyle = hard ? '#3E5226' : '#6E9A45'; ctx.lineWidth = 2.5;
    if (kind === 'v'){
      for (let yy=-d.h/2+30; yy<d.h/2; yy+=30){ ctx.beginPath(); ctx.moveTo(-d.w/2+2, yy); ctx.lineTo(d.w/2-2, yy); ctx.stroke(); }
      ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.beginPath(); ctx.moveTo(-d.w/4, -d.h/2+5); ctx.lineTo(-d.w/4, d.h/2-5); ctx.stroke();
    } else {
      for (let xx=-d.w/2+34; xx<d.w/2; xx+=34){ ctx.beginPath(); ctx.moveTo(xx, -d.h/2+2); ctx.lineTo(xx, d.h/2-2); ctx.stroke(); }
      ctx.strokeStyle = 'rgba(255,255,255,.45)'; ctx.beginPath(); ctx.moveTo(-d.w/2+5, -d.h/4); ctx.lineTo(d.w/2-5, -d.h/4); ctx.stroke();
    }
  }
  if (cracked){
    ctx.strokeStyle = 'rgba(60,40,10,.55)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-8,-10); ctx.lineTo(0,0); ctx.lineTo(-5,9); ctx.moveTo(0,0); ctx.lineTo(9,4); ctx.stroke();
  }
  ctx.restore();
}

function drawFox(f){
  const r = f.plugin.big ? 30 : 22;
  const t = performance.now()/600 + f.plugin.wob;
  ctx.save();
  ctx.translate(f.position.x, f.position.y);
  ctx.rotate(f.angle * .4);
  ctx.fillStyle = '#E2574C';
  ctx.beginPath(); ctx.arc(0, 0, r, 0, 7); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-r*.7, -r*.5); ctx.lineTo(-r*.95, -r*1.25); ctx.lineTo(-r*.25, -r*.85); ctx.closePath();
  ctx.moveTo(r*.7, -r*.5); ctx.lineTo(r*.95, -r*1.25); ctx.lineTo(r*.25, -r*.85); ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(0, r*.35, r*.55, r*.42, 0, 0, 7); ctx.fill();
  const ouch = f.plugin.face === 'ouch';
  ctx.fillStyle = '#2c1a12';
  if (ouch){
    ctx.lineWidth = 3; ctx.strokeStyle = '#2c1a12';
    ctx.beginPath(); ctx.moveTo(-r*.45,-r*.2); ctx.lineTo(-r*.15,-r*.05); ctx.moveTo(-r*.15,-r*.2); ctx.lineTo(-r*.45,-r*.05); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*.45,-r*.2); ctx.lineTo(r*.15,-r*.05); ctx.moveTo(r*.15,-r*.2); ctx.lineTo(r*.45,-r*.05); ctx.stroke();
  } else {
    const blink = Math.sin(t*2.2) > .96 ? .2 : 1;
    ctx.beginPath(); ctx.ellipse(-r*.3, -r*.12, r*.11, r*.11*blink, 0, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse( r*.3, -r*.12, r*.11, r*.11*blink, 0, 0, 7); ctx.fill();
    ctx.lineWidth = 2.5; ctx.strokeStyle = '#7c2d23';
    ctx.beginPath(); ctx.moveTo(-r*.48,-r*.36); ctx.lineTo(-r*.14,-r*.26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(r*.48,-r*.36); ctx.lineTo(r*.14,-r*.26); ctx.stroke();
  }
  ctx.fillStyle = '#2c1a12';
  ctx.beginPath(); ctx.arc(0, r*.22, r*.1, 0, 7); ctx.fill();
  ctx.save(); ctx.rotate(.5);
  ctx.fillStyle = '#7FB069'; rr(r*.4, r*.3, r*.8, r*.22, r*.1); ctx.fill();
  ctx.restore();
  if (f.plugin.big){
    ctx.strokeStyle = 'rgba(255,255,255,.85)'; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(0, 0, r+7, -Math.PI/2, -Math.PI/2 + 6.283 * Math.max(0, f.plugin.hp/f.plugin.maxhp)); ctx.stroke();
  }
  ctx.restore();
}

/* ---- FULL-BODY chibi panda: head + round belly + arms + legs ---- */
function drawPanda(p){
  const r = PANDA_R;
  ctx.save();
  ctx.translate(p.position.x, p.position.y);
  ctx.rotate(p.angle);
  const fly = p.plugin.face === 'fly';

  // ----- legs (black, tucked under belly) -----
  ctx.fillStyle = '#2b2b2b';
  ctx.beginPath(); ctx.ellipse(-r*.42, r*.78, r*.30, r*.22, -.25, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse( r*.42, r*.78, r*.30, r*.22,  .25, 0, 7); ctx.fill();

  // ----- body / belly (white) -----
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(0, r*.42, r*.62, r*.56, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = '#d9d4c4'; ctx.lineWidth = 1.5; ctx.stroke();
  // black shoulder band
  ctx.fillStyle = '#2b2b2b';
  ctx.beginPath(); ctx.ellipse(0, r*.08, r*.62, r*.2, 0, 0, Math.PI, false); ctx.fill();

  // ----- arms (black) — spread out when flying, resting otherwise -----
  ctx.fillStyle = '#2b2b2b';
  if (fly){
    ctx.beginPath(); ctx.ellipse(-r*.72, r*.05, r*.34, r*.17, -.9, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse( r*.72, r*.05, r*.34, r*.17,  .9, 0, 7); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(-r*.6, r*.34, r*.32, r*.17, -.55, 0, 7); ctx.fill();
    ctx.beginPath(); ctx.ellipse( r*.6, r*.34, r*.32, r*.17,  .55, 0, 7); ctx.fill();
  }

  // ----- head -----
  const hy = -r*.42, hr = r*.66;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(0, hy, hr, 0, 7); ctx.fill();
  ctx.strokeStyle = '#d9d4c4'; ctx.lineWidth = 1.5; ctx.stroke();
  // ears
  ctx.fillStyle = '#2b2b2b';
  ctx.beginPath(); ctx.arc(-hr*.74, hy - hr*.72, hr*.4, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc( hr*.74, hy - hr*.72, hr*.4, 0, 7); ctx.fill();
  // eye patches
  ctx.beginPath(); ctx.ellipse(-hr*.4, hy - hr*.05, hr*.3, hr*.37, -.4, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.ellipse( hr*.4, hy - hr*.05, hr*.3, hr*.37,  .4, 0, 7); ctx.fill();
  // eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-hr*.38, hy - hr*.08, hr*.14, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc( hr*.38, hy - hr*.08, hr*.14, 0, 7); ctx.fill();
  ctx.fillStyle = '#1c1c1c';
  const px = fly ? hr*.05 : 0;
  ctx.beginPath(); ctx.arc(-hr*.38+px, hy - hr*.08, hr*.07, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc( hr*.38+px, hy - hr*.08, hr*.07, 0, 7); ctx.fill();
  // nose + mouth
  ctx.beginPath(); ctx.ellipse(0, hy + hr*.24, hr*.13, hr*.09, 0, 0, 7); ctx.fill();
  ctx.strokeStyle = '#1c1c1c'; ctx.lineWidth = 2;
  if (fly){ ctx.beginPath(); ctx.arc(0, hy + hr*.46, hr*.17, 0, Math.PI); ctx.stroke(); }
  else    { ctx.beginPath(); ctx.arc(0, hy + hr*.36, hr*.19, .3, Math.PI - .3); ctx.stroke(); }
  // blush
  ctx.fillStyle = 'rgba(244,148,148,.6)';
  ctx.beginPath(); ctx.arc(-hr*.64, hy + hr*.2, hr*.12, 0, 7); ctx.fill();
  ctx.beginPath(); ctx.arc( hr*.64, hy + hr*.2, hr*.12, 0, 7); ctx.fill();

  ctx.restore();
}

function drawSling(){
  const px = currentPanda && slingLoaded ? currentPanda.position.x : SLING.x;
  const py = currentPanda && slingLoaded ? currentPanda.position.y : SLING.y;
  ctx.strokeStyle = '#5b4226'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  if (slingLoaded){ ctx.beginPath(); ctx.moveTo(SLING.x + 22, SLING.y - 6); ctx.lineTo(px, py); ctx.stroke(); }
  drawBambooStalk(SLING.x, GROUND_Y, 118, 18, '#7FA85C');
  ctx.strokeStyle = '#7FA85C'; ctx.lineWidth = 16; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(SLING.x, GROUND_Y - 112); ctx.lineTo(SLING.x - 24, SLING.y - 16); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(SLING.x, GROUND_Y - 112); ctx.lineTo(SLING.x + 24, SLING.y - 16); ctx.stroke();
  ctx.strokeStyle = '#6f5230'; ctx.lineWidth = 9;
  if (slingLoaded){ ctx.beginPath(); ctx.moveTo(SLING.x - 22, SLING.y - 6); ctx.lineTo(px, py); ctx.stroke(); }
}

function drawTrajectory(){
  if (!dragging || !dragPos) return;
  const dx = SLING.x - dragPos.x, dy = SLING.y - dragPos.y;
  const d = Math.hypot(dx,dy); if (d < 12) return;
  const sp = LAUNCH * Math.min(d, MAXPULL);
  let vx = dx/d*sp, vy = dy/d*sp;
  let x = SLING.x, y = SLING.y;
  ctx.fillStyle = theme.dot;
  for (let i=0;i<26;i++){
    for (let s=0;s<3;s++){ vy += GRAV_STEP; x += vx; y += vy; }
    if (y > GROUND_Y) break;
    ctx.beginPath(); ctx.arc(x, y, Math.max(1.5, 4.5 - i*.12), 0, 7); ctx.fill();
  }
}

function drawHUD(){
  ctx.fillStyle = 'rgba(35,64,44,.78)';
  rr(14, 14, 350, 52, 14); ctx.fill();
  ctx.fillStyle = '#FBF6E3'; ctx.font = '700 19px Trebuchet MS';
  ctx.textBaseline = 'middle'; ctx.textAlign = 'left';
  ctx.fillText(`Lv ${levelIdx+1}`, 30, 41);
  ctx.fillText(theme.name, 100, 41);
  ctx.fillText(`★ ${score}`, 252, 41);
  ctx.textAlign = 'left';
  ctx.fillText(`🦊 ${foxes.length}`, 316, 41);
  // panda queue (mini full-body pandas)
  for (let i=0;i<pandasLeft;i++){
    ctx.save(); ctx.translate(44 + i*42, 104); ctx.scale(.52,.52);
    drawPanda({ position:{x:0,y:0}, angle:0, plugin:{face:'happy'} });
    ctx.restore();
  }
  ctx.fillStyle = 'rgba(35,64,44,.78)';
  rr(W-66, 14, 52, 52, 14); ctx.fill();
  ctx.fillStyle = '#FBF6E3'; ctx.font = '26px Trebuchet MS'; ctx.textAlign = 'center';
  ctx.fillText('↺', W-40, 42);
  // mute toggle
  ctx.fillStyle = 'rgba(35,64,44,.78)';
  rr(W-126, 14, 52, 52, 14); ctx.fill();
  ctx.fillStyle = '#FBF6E3'; ctx.font = '24px Trebuchet MS';
  ctx.fillText(SND.enabled() ? '🔊' : '🔇', W-100, 42);
}

function drawParticles(){
  for (let i=particles.length-1;i>=0;i--){
    const q = particles[i];
    q.life -= .025;
    if (q.life <= 0){ particles.splice(i,1); continue; }
    q.x += q.vx; q.y += q.vy; q.vy += .12;
    ctx.globalAlpha = Math.max(0, q.life);
    ctx.fillStyle = q.color;
    ctx.beginPath(); ctx.arc(q.x, q.y, q.r * q.life, 0, 7); ctx.fill();
    ctx.globalAlpha = 1;
  }
}

/* ---------------- main loop ---------------- */
let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  const dt = Math.min(32, now - last); last = now;

  if (state !== 'menu'){
    Engine.update(engine, dt);
    tickFlow();
    for (const p of pandas){
      if (!p.isStatic){
        // keep the spin readable — pandas roll, they don't blur
        if (Math.abs(p.angularVelocity) > MAX_SPIN)
          Body.setAngularVelocity(p, Math.sign(p.angularVelocity) * MAX_SPIN);
        if (p.position.y > H + 200 && !p.plugin.removed){
          p.plugin.removed = true;
          World.remove(world, p);
          pandas = pandas.filter(x => x !== p);
          if (currentPanda === p) currentPanda = null;
        }
      }
    }
  }

  ctx.save();
  if (shakeT > 0){ shakeT -= .6; ctx.translate((Math.random()-.5)*shakeT, (Math.random()-.5)*shakeT); }

  drawBG();

  if (state !== 'menu'){
    drawTrajectory();
    for (const b of blocks) drawBlock(b);
    for (const f of foxes) drawFox(f);
    drawSling();
    for (const p of pandas) if (!p.isStatic || p === currentPanda) drawPanda(p);
    drawParticles();
    drawHUD();
  }
  ctx.restore();
}
requestAnimationFrame(loop);

/* ---------------- menus ---------------- */
const menuOv = document.getElementById('menuOverlay');
const endOv  = document.getElementById('endOverlay');

function renderLevelGrid(){
  const wrap = document.getElementById('levelGrid');
  wrap.innerHTML = '';
  for (let z = 0; z < TOTAL_LEVELS / 5; z++){
    const zone = document.createElement('div');
    zone.className = 'zone';
    zone.textContent = `${THEMES[z % THEMES.length].name} · ${z*5+1}–${z*5+5}`;
    wrap.appendChild(zone);
    const g = document.createElement('div');
    g.className = 'levels';
    for (let j = 0; j < 5; j++){
      const i = z*5 + j;
      const d = document.createElement('div');
      const locked = i + 1 > save.unlocked;
      d.className = 'lv' + (locked ? ' locked' : '');
      const st = save.stars[String(i)] || 0;
      d.innerHTML = (locked ? '🔒' : (i+1)) + `<div class="stars">${'★'.repeat(st)}${'☆'.repeat(3-st)}</div>`;
      if (!locked) d.onclick = () => { SND.kick(); menuOv.classList.add('hidden'); buildLevel(i); };
      g.appendChild(d);
    }
    wrap.appendChild(g);
  }
}
renderLevelGrid();

document.getElementById('btnRetry').onclick = () => { endOv.classList.add('hidden'); buildLevel(levelIdx); };
document.getElementById('btnNext').onclick  = () => { endOv.classList.add('hidden'); buildLevel(levelIdx + 1); };
document.getElementById('btnMenu').onclick  = () => { endOv.classList.add('hidden'); renderLevelGrid(); menuOv.classList.remove('hidden'); state = 'menu'; };

})();
</script>
